const DATE_FIELDS = [
  "Date_Signature",
  "c1ere_periode_Date_de_debut_de_l_intervention",
  "c1ere_periode_Date_de_fin_de_l_intervention",
  "c2e_periode_Date_de_debut_de_l_intervention",
  "c2e_periode_Date_de_fin_de_l_intervention",
  "c3e_periode_Date_de_debut_de_l_intervention",
  "c3e_periode_Date_de_fin_de_l_intervention",
];

let currentRecord = null;

function formatDate(epochSeconds) {
  const d = new Date(epochSeconds * 1000);
  const jj = String(d.getUTCDate()).padStart(2, "0");
  const mm = String(d.getUTCMonth() + 1).padStart(2, "0");
  const aaaa = d.getUTCFullYear();
  return `${jj}/${mm}/${aaaa}`;
}

function base64ToUint8Array(base64) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

function setStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = type || "";
}

function updateRecordInfo(record) {
  const info = document.getElementById("recordInfo");
  if (!record) {
    info.textContent = "Aucune ligne sélectionnée";
    document.getElementById("genBtn").disabled = true;
    return;
  }
  const label = record.FI_Theme_de_la_session || record.Formation_Lieu || `Ligne ${record.id}`;
  info.textContent = `Ligne sélectionnée : ${label} (id ${record.id})`;
  document.getElementById("genBtn").disabled = false;
}

function buildContext(record) {
  const context = {};
  for (const [key, value] of Object.entries(record)) {
    if (value === null || value === undefined) {
      context[key] = "";
    } else if (DATE_FIELDS.includes(key) && typeof value === "number") {
      context[key] = formatDate(value);
    } else if (Array.isArray(value)) {
      // Colonnes Choice List / Reference List Grist : ["L", val1, val2, ...]
      context[key] = value.filter(v => v !== "L").join(", ");
    } else {
      context[key] = value;
    }
  }
  return context;
}

async function generateDocument() {
  if (!currentRecord) return;

  const btn = document.getElementById("genBtn");
  btn.disabled = true;
  setStatus("Génération en cours...", "");

  try {
    const zip = new PizZip(base64ToUint8Array(TEMPLATE_B64));
    const doc = new window.docxtemplater(zip, {
      paragraphLoop: true,
      linebreaks: true,
      delimiters: { start: "{{", end: "}}" },
    });

    doc.render(buildContext(currentRecord));

    const out = doc.getZip().generate({
      type: "blob",
      mimeType: "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
    });

    const url = URL.createObjectURL(out);
    const a = document.createElement("a");
    a.href = url;
    a.download = `convention_${currentRecord.id}.docx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    setStatus("Document généré et téléchargé ✓", "ok");
  } catch (err) {
    console.error(err);
    setStatus("Erreur : " + (err.message || err), "error");
  } finally {
    btn.disabled = false;
  }
}

document.getElementById("genBtn").addEventListener("click", generateDocument);

grist.ready({ requiredAccess: "read table" });
grist.onRecord((record) => {
  currentRecord = record;
  updateRecordInfo(record);
});
</script>
